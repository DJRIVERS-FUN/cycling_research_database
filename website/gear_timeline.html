<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Gear Timeline</title>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<style>

body {
    font-family: Arial, sans-serif;
    margin: 40px;
    background: white;
}

#chart {
    width: 100%;
    height: 800px;
}

</style>

</head>

<body>

<h1>Gear-State Behaviour Timeline</h1>

<div id="chart"></div>

<script>

async function loadRide() {

    const response =
        await fetch('../website_json/20260513_22862540318.json');

    const data = await response.json();

    const samples = data.samples.filter(
        s =>
            s.distance_m != null &&
            s.gear_label != null &&
            s.power_w != null
    );

    const trace = {

        x: samples.map(
            s => s.distance_m / 1000
        ),

        y: samples.map(
            s => s.gear_label
        ),

        mode: 'markers',

        marker: {

            size: 6,

            color: samples.map(
                s => s.power_w
            ),

            colorbar: {
                title: 'Power'
            }

        }

    };

    const layout = {

        title: 'Gear-State Regulation Across Ride',

        xaxis: {
            title: 'Distance (km)'
        },

        yaxis: {
            title: 'Gear'
        }

    };

    Plotly.newPlot(
        'chart',
        [trace],
        layout
    );
}

loadRide();

</script>

</body>
</html>
