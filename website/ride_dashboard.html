<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Cycling Research Dashboard</title>

    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: white;
        }

        h1 {
            margin-bottom: 20px;
        }

        #chart {
            width: 100%;
            height: 700px;
        }

    </style>
</head>

<body>

<h1>Cycling Research Dashboard</h1>

<div id="chart"></div>

<script>

async function loadRide() {

    const response =
        await fetch('../website_json/20260513_22862540318.json');

    const data = await response.json();

    const samples = data.samples;

    const cleanSamples = samples.filter(
        s => s.distance_m != null &&
             s.power_w != null
    );

    console.log(cleanSamples.slice(0,5));

    const trace = {

        x: cleanSamples.map(
            s => s.distance_m / 1000
        ),

        y: cleanSamples.map(
            s => s.power_w
        ),

        mode: 'lines',

        name: 'Power'

    };

    const layout = {

        title: 'Power Across Ride',

        xaxis: {
            title: 'Distance (km)'
        },

        yaxis: {
            title: 'Power (W)'
        }

    };

    Plotly.newPlot(
        'chart',
        [trace],
        layout
    );
}

loadRide();

</script>

</body>
</html>
